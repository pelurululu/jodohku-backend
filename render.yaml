services:
  - type: web
    name: jodohku-api
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: PYTHON_VERSION
        value: 3.11.0
      # Set these manually in Render dashboard:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: SMTP_HOST
        value: smtp-relay.brevo.com
      - key: SMTP_PORT
        value: 587
      - key: TOYYIBPAY_SECRET_KEY
        sync: false
      - key: TOYYIBPAY_CATEGORY_CODE
        sync: false
      - key: TOYYIBPAY_BASE_URL
        value: https://toyyibpay.com
      - key: FRONTEND_URL
        value: https://jodohku.my
      - key: ALLOWED_ORIGINS
        value: https://jodohku.my,https://www.jodohku.my
      - key: REDIS_URL
        sync: false
